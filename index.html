<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Checkout Flow</title>
<script>
    // Pre-hiding script to prevent FOOC

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

        :root {
            --bg: #0b1118;
            --bg-accent: #111b27;
            --panel: #151f2c;
            --panel-soft: #1b2737;
            --text: #e8f0ff;
            --muted: #9ab0c8;
            --stroke: #2d3d50;
            --category: #3c8dff;
            --category-hover: #2e7cf0;
            --add: #14c57b;
            --add-hover: #10ac6c;
            --remove: #ff5d68;
            --remove-hover: #ef4b56;
            --checkout: #f6cb46;
            --checkout-hover: #e2b836;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 28px 16px;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 10%, #1d3047 0%, transparent 45%),
                radial-gradient(circle at 90% 0%, #233c5a 0%, transparent 40%),
                linear-gradient(160deg, var(--bg) 0%, #070b11 100%);
        }

        .container {
            max-width: 1040px;
            margin: 0 auto;
            background: linear-gradient(180deg, rgba(21, 31, 44, 0.96) 0%, rgba(17, 26, 37, 0.96) 100%);
            padding: 26px;
            border-radius: 20px;
            border: 1px solid rgba(100, 134, 168, 0.24);
            box-shadow: 0 22px 50px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
        }

        h1 {
            text-align: center;
            color: var(--text);
            font-size: clamp(1.8rem, 2.2vw, 2.4rem);
            margin: 4px 0 20px;
            letter-spacing: 0.02em;
        }

        .button-row {
            display: flex;
            flex-wrap:nowrap;
            justify-content: center;
            gap: 12px;
            margin: 16px 0 22px;
            padding: 16px;
            background-color: var(--bg-accent);
            border: 1px solid var(--stroke);
            border-radius: 14px;
            min-height: 62px;
        }

        #products {
            flex-wrap: wrap;
            justify-content: flex-start;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.01em;
            transition: transform 0.15s ease, filter 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        button:active {
            transform: translateY(0);
        }

        .category-btn {
            background-color: var(--category);
            color: #f6faff;
            box-shadow: 0 8px 20px rgba(60, 141, 255, 0.25);
        }

        .category-btn:hover {
            background-color: var(--category-hover);
        }

        .view-btn {
            background-color: #4f6b8a;
            color: #eef5ff;
            padding: 8px 12px;
            font-size: 12px;
        }

        .view-btn:hover {
            background-color: #5f7da0;
        }

        .add-btn {
            background-color: var(--add);
            color: #072315;
            padding: 8px 12px;
            font-size: 12px;
        }

        .add-btn:hover {
            background-color: var(--add-hover);
        }

        .remove-btn {
            background-color: var(--remove);
            color: #300307;
            padding: 8px 12px;
            font-size: 12px;
        }

        .remove-btn:hover {
            background-color: var(--remove-hover);
        }

        .checkout-btn {
            background-color: var(--checkout);
            color: #312200;
            padding: 12px 22px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(246, 203, 70, 0.2);
        }

        .checkout-btn:hover {
            background-color: var(--checkout-hover);
        }

        .product-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background-color: var(--panel);
            border: 1px solid var(--stroke);
            border-radius: 10px;
            width: calc(33.33% - 8px);
            min-width: 200px;
            text-align: center;
        }

        .product-name {
            width: 100%;
            min-width: 0;
            font-weight: 600;
            color: var(--text);
            text-align: center;
        }

        .product-image {
            width: 64px;
            height: 64px;
            border-radius: 10px;
            border: 1px solid rgba(140, 174, 208, 0.35);
            background-color: rgba(255, 255, 255, 0.04);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.28);
            object-fit: cover;
            flex-shrink: 0;
        }

        .product-price {
            width: 100%;
            min-width: 0;
            font-weight: 700;
            color: #9ff7ce;
            text-align: center;
        }

        .product-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            width: 100%;
            justify-content: center;
        }

        .pdp-section {
            margin-top: 18px;
            padding: 18px;
            background: linear-gradient(180deg, #1a2535 0%, #151f2d 100%);
            border: 1px solid var(--stroke);
            border-radius: 14px;
        }

        .pdp-empty {
            color: var(--muted);
            font-weight: 600;
        }

        .pdp-card {
            display: flex;
            gap: 16px;
            align-items: center;
            background-color: var(--panel);
            border: 1px solid var(--stroke);
            border-radius: 12px;
            padding: 14px;
        }

        .pdp-image {
            width: 120px;
            height: 120px;
            border-radius: 14px;
            border: 1px solid rgba(140, 174, 208, 0.35);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.32);
            flex-shrink: 0;
            object-fit: cover;
        }

        .pdp-meta {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .pdp-name {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text);
        }

        .pdp-description {
            color: var(--muted);
            font-weight: 500;
            line-height: 1.4;
        }

        .pdp-category {
            color: #a9bfd8;
            font-size: 13px;
            letter-spacing: 0.02em;
        }

        .pdp-price {
            font-weight: 800;
            color: #9ff7ce;
            font-size: 1.05rem;
        }

        .cart-section {
            margin-top: 30px;
            padding: 18px;
            background: linear-gradient(180deg, var(--panel-soft) 0%, #172233 100%);
            border: 1px solid var(--stroke);
            border-radius: 14px;
        }

        .cart-item {
            padding: 10px 12px;
            background-color: var(--panel);
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid var(--stroke);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 12px;
            margin-bottom: 10px;
            color: var(--muted);
        }

        .recs-trace-section {
            margin-top: 18px;
        }

        .empty-cart {
            color: var(--muted);
            font-weight: 500;
        }

        @media (max-width: 700px) {
            .container {
                padding: 18px;
                border-radius: 16px;
            }

            .product-item,
            .cart-item {
                flex-wrap: wrap;
            }

            .product-item {
                width: 100%;
            }

            .product-price {
                text-align: center;
                min-width: 0;
            }

            .product-actions {
                width: 100%;
                justify-content: center;
            }

            .pdp-card {
                flex-direction: column;
                align-items: flex-start;
            }

            .pdp-image {
                width: 100%;
                max-width: 220px;
                height: auto;
                aspect-ratio: 1 / 1;
            }

            .checkout-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>E-Commerce Checkout</h1>
        
        <div>
            <div class="section-title">Categories</div>
            <div class="button-row" id="categories"></div>
        </div>

        <div>
            <div class="section-title">Product List</div>
            <div class="button-row" id="products"></div>
        </div>

        <div class="pdp-section">
            <div class="section-title">Product View (PDP)</div>
            <div id="pdp" class="pdp-empty">Select a product to open its PDP.</div>
        </div>

        <div class="recs-trace-section">
            <div class="section-title">Recommended Items (Or Recs Trace)</div>
            <div class="button-row" id="recommended-items"></div>
        </div>

        <div class="cart-section">
            <div class="section-title">Shopping Cart</div>
            <div id="cart"></div>
            <div id="cart-total" class="section-title">Total: $0.00</div>
            <button class="checkout-btn" onclick="checkout()">Checkout</button>
        </div>
    </div>

    <script>
        // Data structure
        const categories = {
            electronics: {
                name: 'Electronics',
                products: [
                    { id: 'laptop', name: 'Laptop', sku: 'ELEC-4821', price: 899.99, description: 'High-performance laptop with all-day battery life and a vivid display.' },
                    { id: 'phone', name: 'Phone', sku: 'ELEC-1374', price: 649.5, description: 'Sleek smartphone with excellent camera quality and fast charging.' },
                    { id: 'headphones', name: 'Headphones', sku: 'ELEC-9056', price: 129.0, description: 'Comfort-fit wireless headphones with rich sound and noise isolation.' }
                ]
            },
            clothing: {
                name: 'Clothing',
                products: [
                    { id: 'shirt', name: 'T-Shirt', sku: 'CLTH-2210', price: 24.99, description: 'Soft cotton tee designed for daily comfort and easy layering.' },
                    { id: 'jeans', name: 'Jeans', sku: 'CLTH-7643', price: 54.75, description: 'Modern straight-fit jeans with durable denim and stretch comfort.' },
                    { id: 'shoes', name: 'Shoes', sku: 'CLTH-3188', price: 89.25, description: 'Versatile sneakers that balance lightweight support and clean style.' }
                ]
            },
            books: {
                name: 'Books',
                products: [
                    { id: 'novel', name: 'Novel', sku: 'BOOK-5592', price: 14.99, description: 'A page-turning fiction title with memorable characters and pacing.' },
                    { id: 'textbook', name: 'Textbook', sku: 'BOOK-1048', price: 74.0, description: 'Comprehensive textbook with practical examples and reference material.' },
                    { id: 'comic', name: 'Comic Book', sku: 'BOOK-8731', price: 9.5, description: 'Illustrated comic issue packed with action, color, and storytelling.' }
                ]
            }
        };

        let cart = [];
        let currentCategory = null;
        let currentProduct = null;

        function formatCurrency(value) {
            return `$${value.toFixed(2)}`;
        }

        function calculateCartTotal() {
            return cart.reduce((sum, item) => sum + item.price, 0);
        }

        function hashString(value) {
            let hash = 0;
            for (let i = 0; i < value.length; i += 1) {
                hash = (hash * 31 + value.charCodeAt(i)) >>> 0;
            }
            return hash;
        }

        function createProductImage() {
            return 'https://http.cat/200.jpg';
        }

        function assignProductImages() {
            Object.entries(categories).forEach(([categoryKey, category]) => {
                category.products.forEach(product => {
                    product.image = createProductImage(product.name, categoryKey, product.id);
                });
            });
        }

        function initializeCategories() {
            const categoriesDiv = document.getElementById('categories');
            categoriesDiv.innerHTML = '';
            Object.entries(categories).forEach(([key, category]) => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.textContent = category.name;
                btn.onclick = () => selectCategory(key);
                categoriesDiv.appendChild(btn);
            });
        }

        function selectCategory(categoryKey) {
            currentCategory = categoryKey;
            const category = categories[categoryKey];
            const productsDiv = document.getElementById('products');
            productsDiv.innerHTML = '';
            console.log(`selected category: ${category.name}`);

            category.products.forEach(product => {
                const productDiv = document.createElement('div');
                productDiv.className = 'product-item';

                const nameSpan = document.createElement('span');
                nameSpan.className = 'product-name';
                nameSpan.textContent = product.name;

                const imageEl = document.createElement('img');
                imageEl.className = 'product-image';
                imageEl.src = product.image;
                imageEl.alt = `${product.name} product image`;

                const priceSpan = document.createElement('span');
                priceSpan.className = 'product-price';
                priceSpan.textContent = formatCurrency(product.price);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'product-actions';

                const viewBtn = document.createElement('button');
                viewBtn.className = 'view-btn';
                viewBtn.textContent = 'View Product';
                viewBtn.onclick = () => openProductView(product, categoryKey);
                actionsDiv.appendChild(viewBtn);

                productDiv.appendChild(nameSpan);
                productDiv.appendChild(imageEl);
                productDiv.appendChild(priceSpan);
                productDiv.appendChild(actionsDiv);
                productsDiv.appendChild(productDiv);
            });
        }

        function openProductView(product, categoryKey) {
            currentProduct = product;
            const categoryName = categories[categoryKey]?.name || 'Unknown';
            renderProductView(product, categoryName);
            trackProductView(product, categoryName);
        }

        function renderProductView(product, categoryName) {
            const pdpDiv = document.getElementById('pdp');
            pdpDiv.className = '';
            pdpDiv.innerHTML = '';

            const card = document.createElement('div');
            card.className = 'pdp-card';

            const imageEl = document.createElement('img');
            imageEl.className = 'pdp-image';
            imageEl.src = product.image;
            imageEl.alt = `${product.name} product image`;

            const metaDiv = document.createElement('div');
            metaDiv.className = 'pdp-meta';

            const nameEl = document.createElement('div');
            nameEl.className = 'pdp-name';
            nameEl.textContent = product.name;

            const categoryEl = document.createElement('div');
            categoryEl.className = 'pdp-category';
            categoryEl.textContent = `Category: ${categoryName}`;

            const descriptionEl = document.createElement('div');
            descriptionEl.className = 'pdp-description';
            descriptionEl.textContent = product.description;

            const priceEl = document.createElement('div');
            priceEl.className = 'pdp-price';
            priceEl.textContent = formatCurrency(product.price);

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'product-actions';

            const addBtn = document.createElement('button');
            addBtn.className = 'add-btn';
            addBtn.textContent = 'Add to Cart';
            addBtn.onclick = () => addToCart(product);

            actionsDiv.appendChild(addBtn);

            metaDiv.appendChild(nameEl);
            metaDiv.appendChild(categoryEl);
            metaDiv.appendChild(descriptionEl);
            metaDiv.appendChild(priceEl);
            metaDiv.appendChild(actionsDiv);

            card.appendChild(imageEl);
            card.appendChild(metaDiv);
            pdpDiv.appendChild(card);
        }

        function trackProductView(product, categoryName) {
            const inventory = product.inventory || ((hashString(product.id) % 40) + 10);
            
            alloy("sendEvent", {
                    data: {
                        __adobe: {
                            target: { 
                                entity: {
                                    id: product.sku,
                                    name: product.name,
                                    category: categoryName,
                                    pageUrl: window.location.href,
                                    thumbnailUrl: product.image,
                                    message: `Viewed PDP for ${product.name}`,
                                    value: product.price,
                                    inventory: inventory,
                                    event: 'product_view',
                                    timestamp: new Date().toISOString(),
                                    currency: 'USD'
                                }
                            }
                        }
                    }
            });
            
            console.log('PDP view event sent:', product.name);
        }

        function addToCart(product) {
            cart.push(product);
            console.log(`added ${product.name} to cart`);
            updateCartDisplay();
        }

        function removeFromCart(productId) {
            const index = cart.findIndex(item => item.id === productId);
            if (index > -1) {
                const removedItem = cart[index];
                cart.splice(index, 1);
                console.log(`removed ${removedItem.name} from cart`);
                updateCartDisplay();
            }
        }

        function updateCartDisplay() {
            const cartDiv = document.getElementById('cart');
            const cartTotalDiv = document.getElementById('cart-total');
            const cartTotal = calculateCartTotal();

            if (cart.length === 0) {
                cartDiv.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
                cartTotalDiv.textContent = `Total: ${formatCurrency(cartTotal)}`;
                return;
            }

            cartDiv.innerHTML = '';
            cart.forEach(item => {
                const cartItem = document.createElement('div');
                cartItem.className = 'cart-item';
                cartItem.innerHTML = `
                    <span>${item.name} • ${formatCurrency(item.price)}</span>
                    <button class="remove-btn" onclick="removeFromCart('${item.id}')">Remove</button>
                `;
                cartDiv.appendChild(cartItem);
            });

            cartTotalDiv.textContent = `Total: ${formatCurrency(cartTotal)}`;
        }

        function checkout() {
            const itemNames = cart.map(item => `${item.name} (${item.sku})`).join(', ');
            const cartTotal = calculateCartTotal();
            console.log(`checked out with: ${itemNames || 'empty cart'} | cart total: ${formatCurrency(cartTotal)}`);
            cart = [];
            updateCartDisplay();
        }

        window.addEventListener('DOMContentLoaded', () => {
            assignProductImages();
            initializeCategories();
            updateCartDisplay();

            const firstCategoryKey = Object.keys(categories)[0];
            if (firstCategoryKey) {
                selectCategory(firstCategoryKey);
            }
        });
    </script>
</body>
</html>
